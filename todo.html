<!DOCTYPE html>
<html>
<head>
  <title>To-Do App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }

    input {
      padding: 10px;
      width: 80%;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
    }

    li {
      text-align: left;
      margin: 5px 0;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>My To-Do List</h2>

    <input id="task" placeholder="Enter task">
    <br>

    <button onclick="addTask()">Add Task</button>

    <ul id="list"></ul>
  </div>

  <script>
    function addTask() {
      let task = document.getElementById("task").value;

      if(task === "") {
        alert("Please enter a task");
        return;
      }

      let li = document.createElement("li");
      li.innerText = task;

      li.onclick = function() {
        this.remove();
      }

      document.getElementById("list").appendChild(li);

      document.getElementById("task").value = "";
    }
  </script>

</body>
</html>
