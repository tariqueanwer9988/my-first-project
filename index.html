<!DOCTYPE html>
<html>
<head>
  <title>My Interactive Website</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      display: inline-block;
    }

    button {
      padding: 10px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>

</head>
<body>

  <div class="box">
    <h1 id="title">Hello, I am Learning</h1>

    <button onclick="changeText()">Click Me</button>
  </div>

  <script>
    function changeText() {
      document.getElementById("title").innerText = "You clicked the button!";
    }
  </script>

</body>
</html>
